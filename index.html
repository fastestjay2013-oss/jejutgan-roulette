<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>제줏간 위례중앙광장점 룰렛 이벤트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: radial-gradient(ellipse at top, #2d1000 0%, #1a0800 50%, #0d0000 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: #fff;
      overflow: hidden;
      user-select: none;
    }

    .brand {
      font-size: 15px;
      letter-spacing: 1px;
      color: rgba(255, 220, 100, 0.8);
      margin-bottom: 8px;
      font-weight: 700;
    }

    h1 {
      font-size: clamp(22px, 6vw, 34px);
      font-weight: 900;
      background: linear-gradient(135deg, #FFD700, #FF8C00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 6px;
      line-height: 1.25;
      word-break: keep-all;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #FF4444, #FF0000);
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      padding: 5px 16px;
      border-radius: 30px;
      margin-bottom: 10px;
      letter-spacing: 1px;
      box-shadow: 0 4px 14px rgba(255, 50, 50, 0.45);
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 24px;
      text-align: center;
    }

    .wheel-wrap {
      position: relative;
      width: min(320px, 86vw);
      height: min(320px, 86vw);
      margin-bottom: 30px;
    }

    #wheelCanvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      filter: drop-shadow(0 0 28px rgba(255, 150, 0, 0.35));
    }

    .pointer {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 30px solid #FFD700;
      filter: drop-shadow(0 3px 6px rgba(255, 200, 0, 0.7));
    }

    .spin-btn {
      padding: 16px 56px;
      background: linear-gradient(135deg, #FFD700, #FF6F00);
      color: #1a0800;
      border: none;
      border-radius: 60px;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(255, 140, 0, 0.45);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 1px;
    }
    .spin-btn:active:not(:disabled) {
      transform: scale(0.93);
      box-shadow: 0 4px 14px rgba(255, 140, 0, 0.3);
    }
    .spin-btn:disabled {
      background: linear-gradient(135deg, #555, #333);
      color: #777;
      box-shadow: none;
      cursor: default;
    }

    /* ── Result overlay ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.87);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .overlay.show { display: flex; }

    .result-card {
      background: linear-gradient(160deg, #200d00, #301500);
      border: 2px solid #FFD700;
      border-radius: 28px;
      padding: 36px 28px 32px;
      text-align: center;
      max-width: 310px;
      width: 100%;
      box-shadow: 0 0 60px rgba(255, 150, 0, 0.22);
      animation: popIn 0.48s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      from { transform: scale(0.35) rotate(-6deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .r-emoji  { font-size: 68px; line-height: 1; margin-bottom: 14px; }
    .r-label  { font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 1px; margin-bottom: 8px; }
    .r-prize  {
      font-size: 26px;
      font-weight: 900;
      background: linear-gradient(135deg, #FFD700, #FF8C00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.35;
      margin-bottom: 20px;
    }
    .r-tip {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      line-height: 1.65;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 24px;
    }
    .r-close {
      padding: 14px 44px;
      background: linear-gradient(135deg, #FFD700, #FF6F00);
      color: #1a0800;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    /* ── Confetti ── */
    .confetti {
      position: fixed;
      top: -12px;
      width: 10px;
      height: 10px;
      opacity: 0;
      pointer-events: none;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(105vh) rotate(800deg); opacity: 0; }
    }
  </style>
</head>
<body>

<p class="brand">🍖 제줏간 위례중앙광장점</p>
<span class="badge">🎁 100% 당첨 보장!</span>
<h1>룰렛 이벤트 🎰</h1>
<p class="subtitle">버튼을 눌러 특별한 혜택을 뽑아보세요!</p>

<div class="wheel-wrap">
  <div class="pointer"></div>
  <canvas id="wheelCanvas" width="640" height="640"></canvas>
</div>

<button class="spin-btn" id="spinBtn">🎲 룰렛 돌리기</button>

<!-- Result Modal -->
<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="r-emoji" id="rEmoji">🎉</div>
    <p class="r-label">🎊 축하합니다! 당첨 혜택은</p>
    <div class="r-prize" id="rPrize">-</div>
    <div class="r-tip">직원에게 이 화면을 보여주시면<br>혜택을 바로 받으실 수 있습니다 😊</div>
    <button class="r-close" onclick="closeResult()">확인</button>
  </div>
</div>

<script>
// ────────────────────────────────────────────
//  경품 설정  (pct 합계 = 100)
// ────────────────────────────────────────────
const PRIZES = [
  { name: '음료수 1캔',        pct: 20, color: '#42A5F5', emoji: '🥤' },
  { name: '하이볼 1잔',        pct: 20, color: '#FFA726', emoji: '🥃' },
  { name: '1만원\n식사권',     pct:  5, color: '#FF7043', emoji: '🎟' },
  { name: '5만원\n식사권',     pct:  2, color: '#EC407A', emoji: '🎁' },
  { name: '김치찌개\n무료리필', pct: 20, color: '#EF5350', emoji: '🍲' },
  { name: '족구이\n100g',      pct: 33, color: '#66BB6A', emoji: '🍖' },
];
// ────────────────────────────────────────────

const TWO_PI = Math.PI * 2;
const canvas = document.getElementById('wheelCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width;
const CX = W / 2, CY = W / 2;
const R  = CX - 20;

// 세그먼트 각도 계산 (12시 방향 = -π/2 기준)
let cumPct = 0;
const SEGS = PRIZES.map(p => {
  const s = (cumPct / 100) * TWO_PI - Math.PI / 2;
  cumPct += p.pct;
  const e = (cumPct / 100) * TWO_PI - Math.PI / 2;
  return { ...p, s, e, mid: (s + e) / 2, span: e - s };
});

let rotation = 0;
let spinning  = false;

// ── 휠 그리기 ──────────────────────────────
function drawWheel(rot) {
  ctx.clearRect(0, 0, W, W);

  // 외곽 테두리
  ctx.beginPath();
  ctx.arc(CX, CY, R + 16, 0, TWO_PI);
  ctx.fillStyle = '#1a0800';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(CX, CY, R + 12, 0, TWO_PI);
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 7;
  ctx.stroke();

  // 세그먼트
  for (const seg of SEGS) {
    const s = seg.s + rot;
    const e = seg.e + rot;
    const m = (s + e) / 2;

    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, s, e);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 텍스트 (너무 좁은 세그먼트는 생략)
    const chordAtMid = 2 * R * 0.6 * Math.sin(seg.span / 2);
    const lines      = seg.name.split('\n');
    const maxFont    = chordAtMid / lines.length;
    if (maxFont < 13) continue;

    const fontSize = Math.min(32, Math.max(14, maxFont * 0.9));

    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(m);
    ctx.textAlign    = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = '#fff';
    ctx.font         = `bold ${fontSize}px -apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif`;
    ctx.shadowColor  = 'rgba(0,0,0,0.55)';
    ctx.shadowBlur   = 5;

    const textR  = R - 18;
    const lineH  = fontSize * 1.25;
    const totalH = lineH * lines.length;
    lines.forEach((ln, i) => {
      ctx.fillText(ln, textR, -totalH / 2 + lineH * i + lineH / 2);
    });
    ctx.restore();
  }

  // 중앙 허브
  const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, 50);
  g.addColorStop(0, '#FFE566');
  g.addColorStop(1, '#FF6F00');
  ctx.beginPath();
  ctx.arc(CX, CY, 50, 0, TWO_PI);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.font         = 'bold 28px -apple-system,sans-serif';
  ctx.fillStyle    = '#1a0800';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowBlur   = 0;
  ctx.fillText('GO!', CX, CY + 2);
}

// ── 가중치 랜덤 선택 ───────────────────────
function pickWinner() {
  let r = Math.random() * 100, c = 0;
  for (const p of PRIZES) { c += p.pct; if (r < c) return p; }
  return PRIZES[PRIZES.length - 1];
}

// ── 스핀 ──────────────────────────────────
function spin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  const winner = pickWinner();
  const seg    = SEGS.find(s => s.name === winner.name);

  // 당첨 세그먼트 중간이 포인터(12시 = -π/2)에 오도록 목표각 계산
  const base      = -Math.PI / 2 - seg.mid;
  const minTarget = rotation + TWO_PI * (8 + Math.floor(Math.random() * 5));
  const n         = Math.ceil((minTarget - base) / TWO_PI);
  const target    = base + n * TWO_PI;

  const duration = 4200 + Math.random() * 900;
  const t0       = performance.now();
  const r0       = rotation;

  function ease(t) { return 1 - Math.pow(1 - t, 4); }

  (function frame(now) {
    const t  = Math.min((now - t0) / duration, 1);
    rotation = r0 + (target - r0) * ease(t);
    drawWheel(rotation);
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      rotation = target;
      spinning = false;
      showResult(winner);
    }
  })(performance.now());
}

// ── 결과 모달 ─────────────────────────────
function showResult(winner) {
  document.getElementById('rEmoji').textContent = winner.emoji;
  document.getElementById('rPrize').textContent = winner.name.replace('\n', ' ');
  document.getElementById('overlay').classList.add('show');
  confetti();
}

function closeResult() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('spinBtn').disabled = false;
}

// ── 색종이 효과 ───────────────────────────
function confetti() {
  const colors = ['#FFD700','#FF8C00','#FF4444','#42A5F5','#66BB6A','#EC407A','#fff'];
  for (let i = 0; i < 70; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    const size = 7 + Math.random() * 9;
    el.style.cssText = [
      `left:${Math.random() * 100}vw`,
      `background:${colors[i % colors.length]}`,
      `width:${size}px`,
      `height:${size}px`,
      `border-radius:${Math.random() > 0.5 ? '50%' : '3px'}`,
      `animation-delay:${(Math.random() * 0.7).toFixed(2)}s`,
      `animation-duration:${(2.2 + Math.random() * 1.4).toFixed(2)}s`,
    ].join(';');
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

document.getElementById('spinBtn').addEventListener('click', spin);
drawWheel(0);
</script>
</body>
</html>
